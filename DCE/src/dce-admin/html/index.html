<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DCE Control Center</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Desktop Environment Container -->
    <div id="desktop">
        <!-- Main Toolbar -->
        <div id="main-toolbar">
            <button class="toolbar-btn" data-action="open-window" data-window="organizations">Organizations</button>
            <button class="toolbar-btn" data-action="open-window" data-window="dispatch">Dispatch</button>
            <button class="toolbar-btn" data-action="open-window" data-window="analytics">Analytics</button>
            <button class="toolbar-btn" data-action="open-window" data-window="performance">Performance</button>
            <button class="toolbar-btn" data-action="open-window" data-window="services">Services</button>
            <div class="toolbar-separator"></div>
            <button class="toolbar-btn" data-action="open-window" data-window="plugins">Plugins</button>
            <button class="toolbar-btn" data-action="open-window" data-window="adapters">Adapters</button>
            <div class="toolbar-separator"></div>
            <button class="toolbar-btn" data-action="open-window" data-window="settings">Settings</button>
            <div class="toolbar-separator"></div>
            <button class="toolbar-btn" data-action="open-window" data-window="locations">Locations</button>
            <button class="toolbar-btn" data-action="open-window" data-window="territories">Territories</button>
            <button class="toolbar-btn" data-action="open-window" data-window="world-editor">World Editor</button>
        </div>

        <!-- Notifications Container -->
        <div id="notifications"></div>

        <!-- Status Bar -->
        <div id="status-bar">
            <div class="status-item">
                <span class="status-indicator" id="status-indicator"></span>
                <span id="status-text">Ready</span>
            </div>
            <div class="status-item" id="status-timestamp"></div>
            <div class="status-item" id="status-version">
                DCE v1.0.0
            </div>
        </div>
    </div>

    <!-- Window Templates (cloned for actual windows) -->
    <template id="template-window">
        <div class="window" data-window-id="">
            <div class="window-header">
                <div class="window-title"></div>
                <div class="window-controls">
                    <button class="window-btn pin" title="Pin">📌</button>
                    <button class="window-btn minimize" title="Minimize">—</button>
                    <button class="window-btn maximize" title="Maximize">□</button>
                    <button class="window-btn close" title="Close">✕</button>
                </div>
            </div>
            <div class="window-content">
                <!-- Module content injected here -->
            </div>
            <div class="window-resize-handle"></div>
        </div>
    </template>

    <!-- Chart.js (CDN for now, can be cached later) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="js/framework.js"></script>
    <script src="js/window-manager.js"></script>
    <script src="js/api.js"></script>
    <script src="js/modules/overview.js"></script>
    <script src="js/modules/organizations.js"></script>
    <script src="js/modules/dispatch.js"></script>
    <script src="js/modules/analytics.js"></script>
    <script src="js/modules/performance.js"></script>
    <script src="js/modules/services.js"></script>
    <script src="js/modules/plugins.js"></script>
    <script src="js/modules/adapters.js"></script>
    <script src="js/modules/settings.js"></script>
    <script src="js/modules/locations.js"></script>
    <script src="js/modules/territories.js"></script>
    <script src="js/modules/world-editor.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
